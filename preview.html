<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>MaintenanceDeluxe — Preview</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; color: #eee; font-family: -apple-system, "Segoe UI", sans-serif; }
        #controls {
            position: fixed; top: 12px; left: 12px; z-index: 2000000;
            background: rgba(20,20,20,.92); border: 1px solid #444;
            border-radius: 10px; padding: 14px 16px; width: 280px;
            font-size: 12px; backdrop-filter: blur(10px);
        }
        #controls h2 { margin: 0 0 10px; font-size: 13px; letter-spacing: .05em; text-transform: uppercase; color: #C9A96E; }
        #controls label { display: block; margin: 8px 0 4px; color: #bbb; }
        #controls input[type="range"] { width: 100%; }
        #controls input[type="number"], #controls select {
            width: 100%; padding: 5px 8px; background: #111; color: #eee;
            border: 1px solid #333; border-radius: 4px; font-family: inherit; font-size: 12px;
        }
        #controls button {
            margin-top: 12px; width: 100%; padding: 8px;
            background: #C9A96E; color: #1A1412; border: 0;
            border-radius: 6px; font-weight: 600; cursor: pointer;
            font-family: inherit;
        }
        #controls button:hover { filter: brightness(1.1); }
        #controls .hint { color: #888; font-size: 11px; margin-top: 8px; line-height: 1.4; }
        .cb { display: flex; align-items: center; gap: 6px; margin: 6px 0; }
        .cb input { margin: 0; }
        .row { display: flex; gap: 8px; align-items: center; }
        .row input[type="range"] { flex: 1; }
        .val { min-width: 40px; text-align: right; font-family: monospace; color: #C9A96E; }
    </style>
</head>
<body>

<div id="controls">
    <h2>Preview Controls</h2>

    <label>Temps restant : <span class="val" id="remainVal">35 min</span></label>
    <div class="row">
        <input type="range" id="remain" min="-15" max="180" value="35" step="1">
    </div>

    <label>Durée totale : <span class="val" id="totalVal">55 min</span></label>
    <div class="row">
        <input type="range" id="total" min="10" max="240" value="55" step="5">
    </div>

    <label>Performance tier</label>
    <select id="tier">
        <option value="full" selected>Full (desktop)</option>
        <option value="reduced">Reduced (TV)</option>
        <option value="minimal">Minimal (reduced-motion)</option>
    </select>

    <label>Nombre de release notes : <span class="val" id="notesVal">3</span></label>
    <div class="row">
        <input type="range" id="notesCount" min="0" max="8" value="3" step="1">
    </div>

    <div class="cb">
        <input type="checkbox" id="showStatusUrl" checked>
        <label for="showStatusUrl">Afficher lien statut</label>
    </div>
    <div class="cb">
        <input type="checkbox" id="showAdmin" checked>
        <label for="showAdmin">Mode admin (bouton fermer)</label>
    </div>

    <button id="rebuild">🔄 Rebuild overlay</button>

    <div class="hint">
        Négatif = retard (overtime). Modifie les valeurs et clique Rebuild pour voir le rendu.
    </div>
</div>

<script>
(function () {
    "use strict";

    var OVERLAY_Z_INDEX = 1000000;
    var MD_STYLES_INJECTED = false;
    var maintenanceOverlay = null;
    var maintenanceTimerId = null;
    var MAINTENANCE = null;

    // ── Copied from banner.js overlay code ──────────────────────────

    function injectMaintenanceStyles() {
        if (MD_STYLES_INJECTED) return;
        MD_STYLES_INJECTED = true;
        var style = document.createElement("style");
        style.id = "jf-md-styles";
        style.textContent = MD_CSS;
        document.head.appendChild(style);
    }

    function mdToHtml(src) {
        if (!src) return "";
        var esc = function (s) { return s.replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        }); };
        function renderInline(s) {
            return s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
                    .replace(/\*([^*]+)\*/g, "<em>$1</em>");
        }
        var lines = src.split(/\r?\n/);
        var html = "";
        var inList = false;
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            var trimmed = line.replace(/^\s+/, "");
            var isItem = /^-\s+/.test(trimmed);
            if (isItem) {
                if (!inList) { html += "<ul>"; inList = true; }
                html += "<li>" + renderInline(esc(trimmed.replace(/^-\s+/, ""))) + "</li>";
            } else {
                if (inList) { html += "</ul>"; inList = false; }
                if (trimmed.length === 0) { if (i > 0) html += "<br>"; }
                else html += "<p>" + renderInline(esc(line)) + "</p>";
            }
        }
        if (inList) html += "</ul>";
        return html;
    }

    function formatLocalTime(date) {
        try {
            return date.toLocaleTimeString(navigator.language || "default", {
                hour: "2-digit", minute: "2-digit", hour12: false
            }).replace(":", "h");
        } catch (e) {
            return date.getHours() + "h" + String(date.getMinutes()).padStart(2, "0");
        }
    }

    function formatRelative(ms) {
        if (ms <= 0) return "";
        var totalSec = Math.floor(ms / 1000);
        var h = Math.floor(totalSec / 3600);
        var m = Math.floor((totalSec % 3600) / 60);
        var s = totalSec % 60;
        if (totalSec < 5 * 60) {
            return (m > 0 ? m + " min " : "") + String(s).padStart(2, "0") + " s";
        }
        if (h >= 1) return "≈ " + h + " h " + (m > 0 ? m + " min" : "");
        return "≈ " + m + " min";
    }

    function parseDateOrNull(s) {
        if (!s) return null;
        var d = new Date(s);
        return isNaN(d.getTime()) ? null : d;
    }

    function updateMaintenanceTimer() {
        if (!maintenanceOverlay || !MAINTENANCE) return;
        var absEl = maintenanceOverlay.querySelector(".jf-md-time-absolute");
        var relEl = maintenanceOverlay.querySelector(".jf-md-time-relative");
        var timeBox = maintenanceOverlay.querySelector(".jf-md-time");
        var fill = maintenanceOverlay.querySelector(".jf-md-progress-fill");
        if (!absEl || !relEl || !timeBox || !fill) return;

        var start = parseDateOrNull(MAINTENANCE.scheduledStart);
        var activatedAt = parseDateOrNull(MAINTENANCE.activatedAt);
        var end = parseDateOrNull(MAINTENANCE.scheduledEnd);
        if (!end) {
            absEl.textContent = "";
            relEl.textContent = "Retour bientôt";
            fill.style.width = "100%";
            timeBox.querySelector(".jf-md-progress").style.display = "none";
            return;
        }

        var now = Date.now();
        var endMs = end.getTime();
        var startMs = start ? start.getTime() : activatedAt ? activatedAt.getTime() : now;
        var total = Math.max(1, endMs - startMs);
        var elapsed = now - startMs;
        var remaining = endMs - now;

        absEl.textContent = "Retour prévu à " + formatLocalTime(end);

        if (remaining > 0) {
            timeBox.classList.remove("overtime");
            relEl.textContent = formatRelative(remaining);
            fill.style.width = Math.min(100, Math.max(0, (elapsed / total) * 100)) + "%";
        } else {
            timeBox.classList.add("overtime");
            var overM = Math.floor(-remaining / 60000);
            relEl.textContent = "Finalisation en cours" + (overM > 0 ? " (+" + overM + " min)" : "");
            fill.style.width = "100%";
        }
    }

    function escapeMdHtml(s) {
        return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
    }

    function buildMaintenanceOverlay(m, isAdmin, forcedTier) {
        var tier = forcedTier || "full";
        var title = (m && m.customTitle) || "Serveur en maintenance";
        var subtitle = (m && m.customSubtitle) || "On en profite pour améliorer ton expérience";
        var statusUrl = (m && m.statusUrl) || "";
        var notes = (m && m.releaseNotes) || [];

        var overlay = document.createElement("div");
        overlay.id = "jf-md-overlay";
        overlay.className = "jf-md-tier-" + tier;

        var bg = document.createElement("div");
        bg.className = "jf-md-bg";
        bg.innerHTML =
            '<div class="jf-md-blob jf-md-blob--gold"></div>' +
            '<div class="jf-md-blob jf-md-blob--midnight"></div>' +
            '<div class="jf-md-grain"></div>';
        overlay.appendChild(bg);

        if (tier === "full") {
            var particles = document.createElement("div");
            particles.className = "jf-md-particles";
            for (var i = 0; i < 22; i++) {
                var p = document.createElement("span");
                p.className = "jf-md-particle";
                var sizeClass = Math.random();
                if (sizeClass < 0.6) p.classList.add("jf-md-p-sm");
                else if (sizeClass < 0.9) p.classList.add("jf-md-p-md");
                else p.classList.add("jf-md-p-lg");
                p.style.left = (Math.random() * 100) + "%";
                p.style.top = (Math.random() * 100) + "%";
                p.style.animationDuration = (8 + Math.random() * 20) + "s";
                p.style.animationDelay = (-Math.random() * 24) + "s";
                p.style.setProperty("--jf-dx", (Math.random() * 160 - 80) + "px");
                p.style.setProperty("--jf-dy", (Math.random() > 0.5 ? -1 : 1) * (70 + Math.random() * 60) + "vh");
                p.style.setProperty("--jf-flicker-delay", (-Math.random() * 3) + "s");
                particles.appendChild(p);
            }
            overlay.appendChild(particles);
        }

        var card = document.createElement("div");
        card.className = "jf-md-card";

        var cardHtml =
            '<div class="jf-md-logo" aria-hidden="true">▶</div>' +
            '<h1 class="jf-md-title">' + escapeMdHtml(title) + '</h1>' +
            '<p class="jf-md-subtitle">' + escapeMdHtml(subtitle) + '</p>';

        cardHtml +=
            '<div class="jf-md-time">' +
                '<div class="jf-md-time-absolute"></div>' +
                '<div class="jf-md-time-relative"></div>' +
                '<div class="jf-md-progress"><div class="jf-md-progress-fill"></div></div>' +
            '</div>';

        if (notes.length > 0) {
            cardHtml += '<div class="jf-md-notes">' +
                '<h2 class="jf-md-notes-title">Au programme</h2>' +
                '<div class="jf-md-notes-list">';
            for (var j = 0; j < notes.length; j++) {
                var n = notes[j];
                cardHtml += '<div class="jf-md-note">' +
                    '<div class="jf-md-note-icon">' + escapeMdHtml(n.icon || "✨") + '</div>' +
                    '<div class="jf-md-note-content">' +
                        (n.title ? '<h3 class="jf-md-note-title">' + escapeMdHtml(n.title) + '</h3>' : '') +
                        (n.body ? '<div class="jf-md-note-body">' + mdToHtml(n.body) + '</div>' : '') +
                    '</div>' +
                '</div>';
            }
            cardHtml += '</div></div>';
        }

        cardHtml += '<div class="jf-md-footer">';
        if (statusUrl) {
            cardHtml += '<a class="jf-md-status-link" href="' + encodeURI(statusUrl) + '" target="_blank" rel="noopener noreferrer">Voir le statut détaillé ↗</a>';
        }
        if (isAdmin) {
            cardHtml += '<button type="button" class="jf-md-dismiss">✕ Accès admin</button>';
        }
        cardHtml += '</div>';

        card.innerHTML = cardHtml;
        overlay.appendChild(card);
        return overlay;
    }

    // ── Sample release notes pool ────────────────────────────────────

    var SAMPLE_NOTES = [
        { icon: "🎬", title: "12 nouveaux films ajoutés", body: "Ajout des dernières sorties : **Dune 3**, **Oppenheimer**, et le meilleur de A24.\n\nParfait pour une soirée cinéma." },
        { icon: "⚡", title: "Jellyfin 10.11.6 → 10.12", body: "- Streaming **30% plus rapide** (nouveau décodeur)\n- Meilleure compression vidéo\n- Correction de 47 bugs" },
        { icon: "🧹", title: "Nettoyage de la bibliothèque", body: "Suppression des doublons + recompression des 4K trop lourds. *~80 Go récupérés.*" },
        { icon: "🎞️", title: "Saisons complètes ajoutées", body: "- **Severance S2**\n- **The Bear S3**\n- **Shogun S1**" },
        { icon: "🔒", title: "Mise à jour sécurité", body: "Correctifs **CVE-2026-XXXX** appliqués. Rien de grave, mais on préfère être carré." },
        { icon: "🌐", title: "Accès distant amélioré", body: "Nouveau reverse proxy pour réduire la latence depuis l'extérieur." },
        { icon: "📊", title: "Statistiques d'usage", body: "Nouvel onglet dans l'admin : suivi de la bande passante + films les plus regardés du mois." },
        { icon: "🎨", title: "Thème MaintenanceDeluxe", body: "Cette belle page de maintenance que tu regardes — *c'est fait maison*." }
    ];

    // ── Controls ─────────────────────────────────────────────────────

    function getRemainMin() { return parseInt(document.getElementById("remain").value, 10); }
    function getTotalMin() { return parseInt(document.getElementById("total").value, 10); }
    function getTier() { return document.getElementById("tier").value; }
    function getNotesCount() { return parseInt(document.getElementById("notesCount").value, 10); }
    function getShowStatusUrl() { return document.getElementById("showStatusUrl").checked; }
    function getShowAdmin() { return document.getElementById("showAdmin").checked; }

    function rebuild() {
        // Clean up previous overlay
        if (maintenanceTimerId) { clearInterval(maintenanceTimerId); maintenanceTimerId = null; }
        if (maintenanceOverlay && maintenanceOverlay.parentNode) {
            maintenanceOverlay.parentNode.removeChild(maintenanceOverlay);
        }
        maintenanceOverlay = null;

        var remainMin = getRemainMin();
        var totalMin = getTotalMin();
        var tier = getTier();
        var notesCount = getNotesCount();

        var now = new Date();
        var end = new Date(now.getTime() + remainMin * 60 * 1000);
        var start = new Date(end.getTime() - totalMin * 60 * 1000);

        MAINTENANCE = {
            isActive: true,
            customTitle: "Serveur en maintenance",
            customSubtitle: "On en profite pour améliorer ton expérience",
            statusUrl: getShowStatusUrl() ? "https://example.com/status" : "",
            activatedAt: start.toISOString(),
            scheduledStart: start.toISOString(),
            scheduledEnd: end.toISOString(),
            releaseNotes: SAMPLE_NOTES.slice(0, notesCount)
        };

        injectMaintenanceStyles();
        var overlay = buildMaintenanceOverlay(MAINTENANCE, getShowAdmin(), tier);
        document.body.appendChild(overlay);
        maintenanceOverlay = overlay;
        updateMaintenanceTimer();
        requestAnimationFrame(function () { overlay.classList.add("visible"); });
        maintenanceTimerId = setInterval(updateMaintenanceTimer, 1000);

        // Wire up dismiss button (preview mode: just rebuild without admin)
        var dismissBtn = overlay.querySelector(".jf-md-dismiss");
        if (dismissBtn) {
            dismissBtn.addEventListener("click", function () {
                if (maintenanceTimerId) clearInterval(maintenanceTimerId);
                if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
                maintenanceOverlay = null;
            });
        }
    }

    function updateLabels() {
        document.getElementById("remainVal").textContent = getRemainMin() + " min";
        document.getElementById("totalVal").textContent = getTotalMin() + " min";
        document.getElementById("notesVal").textContent = getNotesCount();
    }

    document.getElementById("rebuild").addEventListener("click", rebuild);
    ["remain", "total", "notesCount"].forEach(function (id) {
        document.getElementById(id).addEventListener("input", updateLabels);
    });
    ["remain", "total", "tier", "notesCount", "showStatusUrl", "showAdmin"].forEach(function (id) {
        document.getElementById(id).addEventListener("change", rebuild);
    });

    // ── Overlay CSS (copy from banner.js) ────────────────────────────

    var MD_CSS = [
        "#jf-md-overlay{position:fixed;inset:0;z-index:" + OVERLAY_Z_INDEX + ";",
        "background:#1A1412;color:#F4EDE4;",
        "font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;",
        "overflow:hidden;display:flex;align-items:center;justify-content:center;padding:24px;",
        "opacity:0;transition:opacity .4s ease;}",
        "#jf-md-overlay.visible{opacity:1;}",
        ".jf-md-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;}",
        ".jf-md-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.22;will-change:transform;}",
        ".jf-md-blob--gold{width:60vw;height:60vw;top:-20%;left:-10%;",
        "background:radial-gradient(circle,#C9A96E 0%,transparent 70%);",
        "animation:jf-md-drift1 80s ease-in-out infinite alternate;}",
        ".jf-md-blob--midnight{width:55vw;height:55vw;bottom:-25%;right:-15%;",
        "background:radial-gradient(circle,#1e2a42 0%,transparent 70%);",
        "animation:jf-md-drift2 100s ease-in-out infinite alternate;}",
        "@keyframes jf-md-drift1{to{transform:translate(12vw,10vh) scale(1.08);}}",
        "@keyframes jf-md-drift2{to{transform:translate(-10vw,-8vh) scale(.95);}}",
        ".jf-md-grain{position:absolute;inset:0;pointer-events:none;opacity:.09;mix-blend-mode:overlay;",
        "background-image:url(\"data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>\");}",
        ".jf-md-particles{position:absolute;inset:0;pointer-events:none;}",
        ".jf-md-particle{position:absolute;border-radius:50%;will-change:transform,opacity;",
        "animation:jf-md-float 18s linear infinite,jf-md-flicker 2.4s ease-in-out infinite;",
        "animation-delay:inherit,var(--jf-flicker-delay,0s);}",
        ".jf-md-p-sm{width:2px;height:2px;background:#C9A96E;box-shadow:0 0 4px #C9A96E;}",
        ".jf-md-p-md{width:3px;height:3px;background:#E4C88B;box-shadow:0 0 8px #E4C88B;}",
        ".jf-md-p-lg{width:4px;height:4px;background:#F4D89B;box-shadow:0 0 14px #F4D89B,0 0 24px rgba(244,216,155,.4);}",
        "@keyframes jf-md-float{",
        "0%{transform:translate(0,0);}",
        "100%{transform:translate(var(--jf-dx,20px),var(--jf-dy,-100vh));}}",
        "@keyframes jf-md-flicker{",
        "0%{opacity:.15;}",
        "30%{opacity:.8;}",
        "55%{opacity:.25;}",
        "80%{opacity:.9;}",
        "100%{opacity:.15;}}",
        ".jf-md-card{position:relative;max-width:640px;width:100%;max-height:92vh;overflow-y:auto;",
        "padding:48px 44px;border-radius:16px;background:rgba(26,20,18,.72);",
        "border:1px solid rgba(201,169,110,.32);text-align:center;",
        "box-shadow:0 0 0 1px rgba(201,169,110,.08) inset,",
        "0 24px 70px -20px rgba(0,0,0,.55),",
        "0 0 50px -10px rgba(201,169,110,.22);",
        "backdrop-filter:blur(24px) saturate(1.3);",
        "-webkit-backdrop-filter:blur(24px) saturate(1.3);}",
        "@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){",
        ".jf-md-card{background:rgba(26,20,18,.96);}}",
        ".jf-md-logo{font-size:42px;margin-bottom:22px;color:#E4C88B;",
        "text-shadow:0 0 16px rgba(201,169,110,.4);",
        "animation:jf-md-breathe 5s ease-in-out infinite;}",
        "@keyframes jf-md-breathe{0%,100%{opacity:.55;}50%{opacity:1;}}",
        ".jf-md-title{font-family:'Instrument Serif','Cormorant Garamond',Georgia,serif;",
        "font-weight:400;font-size:clamp(30px,5.2vw,44px);color:#E4C88B;",
        "margin:0 0 10px 0;letter-spacing:.01em;line-height:1.12;",
        "text-shadow:0 2px 20px rgba(201,169,110,.2);}",
        ".jf-md-subtitle{font-size:16.5px;color:#D4C3B2;margin:0 0 16px 0;line-height:1.55;}",
        ".jf-md-time{margin:32px 0 22px;padding:20px 22px;border-radius:12px;",
        "background:rgba(0,0,0,.38);border:1px solid rgba(201,169,110,.2);}",
        ".jf-md-time-absolute{font-family:'Geist Mono','JetBrains Mono',Menlo,Consolas,monospace;",
        "font-variant-numeric:tabular-nums;font-size:clamp(24px,4.2vw,32px);",
        "font-weight:500;color:#F4EDE4;line-height:1.2;letter-spacing:.01em;}",
        ".jf-md-time-relative{margin-top:6px;font-size:14.5px;color:#C9A96E;font-variant-numeric:tabular-nums;font-weight:500;}",
        ".jf-md-progress{margin-top:18px;height:6px;background:rgba(201,169,110,.15);border-radius:3px;overflow:hidden;",
        "box-shadow:inset 0 1px 2px rgba(0,0,0,.3);}",
        ".jf-md-progress-fill{height:100%;background:linear-gradient(90deg,#C9A96E,#E4C88B,#8B4A3A);transition:width 1s linear;width:0;",
        "box-shadow:0 0 12px rgba(201,169,110,.5);}",
        ".jf-md-time.overtime .jf-md-progress-fill{background:#d18033;animation:jf-md-pulse 2s ease-in-out infinite;}",
        "@keyframes jf-md-pulse{50%{opacity:.45;}}",
        ".jf-md-notes{margin-top:30px;padding-top:24px;border-top:1px solid rgba(201,169,110,.22);}",
        ".jf-md-notes-title{font-size:11px;text-transform:uppercase;letter-spacing:.2em;",
        "color:#C9A96E;font-weight:600;margin:0 0 18px 0;text-align:left;}",
        ".jf-md-note{display:grid;grid-template-columns:42px 1fr;gap:14px;margin-bottom:18px;text-align:left;}",
        ".jf-md-note-icon{font-size:26px;line-height:1.2;filter:drop-shadow(0 0 8px rgba(201,169,110,.3));}",
        ".jf-md-note-title{font-size:15px;color:#E4C88B;margin:0 0 5px 0;font-weight:500;}",
        ".jf-md-note-body{font-size:13.5px;color:#D4C3B2;line-height:1.65;}",
        ".jf-md-note-body p{margin:0 0 5px;}",
        ".jf-md-note-body strong{color:#F4EDE4;font-weight:600;}",
        ".jf-md-note-body em{font-style:italic;color:#E4C88B;}",
        ".jf-md-note-body ul{padding-left:18px;margin:6px 0;}",
        ".jf-md-note-body li{margin:3px 0;}",
        ".jf-md-footer{margin-top:26px;padding-top:20px;border-top:1px solid rgba(201,169,110,.18);",
        "display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;}",
        ".jf-md-status-link{color:#E4C88B;font-size:13px;text-decoration:none;padding:8px 16px;",
        "border-radius:8px;border:1px solid rgba(201,169,110,.4);transition:all .2s;}",
