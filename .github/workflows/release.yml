name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger so the smoke job can be validated against a real Jellyfin
  # WITHOUT cutting a tag. On a manual run github.ref_type is 'branch', so the
  # release job below is skipped (its `if`) and only `smoke` runs.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── gate: prove the built DLL actually loads + its endpoints resolve on a real
  #     Jellyfin server, across the targetAbi floor and the current prod version.
  #     Catches the runtime API-incompatibility bug class (MissingMethodException on
  #     IUserManager.GetUsers() that shipped in v0.8.0) that no unit test can see.
  smoke:
    name: smoke (${{ matrix.jellyfin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The build's targetAbi (manifest versions[0].targetAbi) is the FLOOR: a server
        # older than it legitimately refuses the plugin ("Skipping disabled plugin").
        # So we smoke on servers >= targetAbi: 10.11.10 (floor/prod) + every newer patch
        # released since, to prove forward-compat. Add new Jellyfin patch tags here as they ship.
        jellyfin: ["10.11.10", "10.11.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Build Release DLL
        run: dotnet build --configuration Release Jellyfin.Plugin.MaintenanceDeluxe/MaintenanceDeluxe.csproj

      - name: Stage plugin + meta.json into a Jellyfin config volume
        run: |
          PLUGDIR="$PWD/jf-config/plugins/MaintenanceDeluxe"
          mkdir -p "$PLUGDIR"
          cp Jellyfin.Plugin.MaintenanceDeluxe/bin/Release/net9.0/Jellyfin.Plugin.MaintenanceDeluxe.dll "$PLUGDIR/"
          python3 - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path("manifest.json").read_text(encoding="utf-8"))[0]
          v = m["versions"][0]
          meta = {
              "category": m["category"], "changelog": v["changelog"],
              "description": m["description"], "guid": m["guid"], "name": m["name"],
              "overview": m["overview"], "owner": m["owner"],
              "targetAbi": v["targetAbi"], "timestamp": v["timestamp"],
              "version": v["version"], "status": "Active", "autoUpdate": True, "assemblies": [],
          }
          Path("jf-config/plugins/MaintenanceDeluxe/meta.json").write_text(
              json.dumps(meta, indent=2) + "\n", encoding="utf-8")
          print("staged meta.json for", m["name"], v["version"])
          PY

      - name: Run Jellyfin ${{ matrix.jellyfin }} with the plugin mounted
        run: |
          docker run -d --name jf -p 8096:8096 \
            -v "$PWD/jf-config:/config" \
            jellyfin/jellyfin:${{ matrix.jellyfin }}

      - name: Run smoke assertions
        run: bash scripts/smoke_test.sh http://localhost:8096

      - name: Assert plugin loaded cleanly (no load / method-resolution errors)
        run: |
          LOG=$(docker logs jf 2>&1 || true)
          echo "$LOG" | grep -i "MaintenanceDeluxe" || echo "(no MaintenanceDeluxe log lines)"
          # Positive: the assembly must actually be loaded on this server version.
          if ! echo "$LOG" | grep -q "Loaded assembly Jellyfin.Plugin.MaintenanceDeluxe"; then
            echo "::error::Plugin assembly was NOT loaded on Jellyfin ${{ matrix.jellyfin }} (targetAbi mismatch? plugin disabled?)"
            exit 1
          fi
          # Negative: none of the known failure signatures may appear.
          if echo "$LOG" | grep -iE "MissingMethodException|MethodAccessException|Failed to load plugin|Skipping disabled plugin.*MaintenanceDeluxe|Error loading|Could not load file or assembly"; then
            echo "::error::Plugin load / method-resolution error detected in Jellyfin ${{ matrix.jellyfin }} log"
            exit 1
          fi
          echo "Plugin loaded cleanly on Jellyfin ${{ matrix.jellyfin }}; no load/method errors."

      - name: Dump Jellyfin log (always)
        if: always()
        run: docker logs jf 2>&1 | tail -200 || true

  release:
    name: build, package, release, update manifest
    needs: smoke
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"   # e.g. v0.2.0 or v0.3.1.1
          VERSION="${TAG#v}"         # strip leading v -> 0.2.0 / 0.3.1.1
          # AssemblyVersion is W.X.Y.Z (4 parts max). If the tag already has 4 parts,
          # use as-is; otherwise pad with .0 to reach 4 parts.
          DOTS=$(echo "$VERSION" | tr -cd . | wc -c)
          if [ "$DOTS" -ge 3 ]; then
            DLL_VERSION="$VERSION"
          else
            DLL_VERSION="${VERSION}.0"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dll_version=$DLL_VERSION" >> "$GITHUB_OUTPUT"

      # ─── gate: reuse the CI checks so a broken tag never releases ───────────
      - name: Check banner.js is ASCII-safe
        run: python scripts/escape_non_ascii.py --check Jellyfin.Plugin.MaintenanceDeluxe/Resources/banner.js

      - name: Syntax check banner.js
        run: node --check Jellyfin.Plugin.MaintenanceDeluxe/Resources/banner.js

      - name: Syntax check admin.js
        run: node --check Jellyfin.Plugin.MaintenanceDeluxe/Configuration/admin.js

      - name: Verify configPage.html no longer has inline script
        run: |
          if grep -qE '<script[^>]*>[^<]' Jellyfin.Plugin.MaintenanceDeluxe/Configuration/configPage.html; then
            echo "error: configPage.html contains inline script content. Move it to admin.js." >&2
            exit 1
          fi

      - name: Verify configPage.html no longer has inline style
        run: |
          if grep -qE '<style[^>]*>[^<]' Jellyfin.Plugin.MaintenanceDeluxe/Configuration/configPage.html; then
            echo "error: configPage.html contains inline style content. Move it to admin.css." >&2
            exit 1
          fi

      - name: Version coherence (csproj / manifest.json)
        run: python scripts/check_version_coherence.py

      - name: Tag matches csproj version
        run: |
          EXPECTED="${{ steps.version.outputs.dll_version }}"
          ACTUAL=$(python scripts/check_version_coherence.py | awk -F': ' '/^csproj /{print $2; exit}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "error: tag ${{ steps.version.outputs.tag }} implies version [$EXPECTED] but csproj has [$ACTUAL]" >&2
            exit 1
          fi

      # ─── gate: full unit suite (ci.yml has no tag trigger, so the only thing that runs on a
      #     tag is this workflow — without this step a C#-only regression could ship). ──────────
      - name: Run xUnit tests
        run: dotnet test Jellyfin.Plugin.MaintenanceDeluxe.Tests/Jellyfin.Plugin.MaintenanceDeluxe.Tests.csproj --configuration Release --logger "console;verbosity=normal"

      # ─── build + package ────────────────────────────────────────────────────
      - name: Build Release
        run: dotnet build --configuration Release Jellyfin.Plugin.MaintenanceDeluxe/MaintenanceDeluxe.csproj

      - name: Generate deploy bundle (DLL + meta.json derived from manifest.json)
        run: |
          mkdir -p deploy/MaintenanceDeluxe
          cp Jellyfin.Plugin.MaintenanceDeluxe/bin/Release/net9.0/Jellyfin.Plugin.MaintenanceDeluxe.dll deploy/MaintenanceDeluxe/
          python - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path("manifest.json").read_text(encoding="utf-8"))[0]
          v = m["versions"][0]
          meta = {
              "category": m["category"],
              "changelog": v["changelog"],
              "description": m["description"],
              "guid": m["guid"],
              "name": m["name"],
              "overview": m["overview"],
              "owner": m["owner"],
              "targetAbi": v["targetAbi"],
              "timestamp": v["timestamp"],
              "version": v["version"],
              "status": "Active",
              "autoUpdate": True,
              "assemblies": [],
          }
          Path("deploy/MaintenanceDeluxe/meta.json").write_text(
              json.dumps(meta, indent=2) + "\n", encoding="utf-8"
          )
          print("Generated deploy/MaintenanceDeluxe/meta.json from manifest.json")
          PY

      - name: Create zip
        id: zip
        run: |
          ZIP_NAME="MaintenanceDeluxe-${{ steps.version.outputs.tag }}.zip"
          (cd deploy/MaintenanceDeluxe && zip -j "${GITHUB_WORKSPACE}/$ZIP_NAME" Jellyfin.Plugin.MaintenanceDeluxe.dll meta.json)
          echo "name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "path=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Compute MD5 checksum
        id: md5
        run: |
          CHECKSUM=$(md5sum "${{ steps.zip.outputs.path }}" | awk '{print toupper($1)}')
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "MD5: $CHECKSUM"

      # ─── create GitHub release ──────────────────────────────────────────────
      - name: Resolve release notes (prefer narrative docs/release-notes/<tag>.md)
        id: changelog
        run: |
          NARRATIVE="docs/release-notes/${{ steps.version.outputs.tag }}.md"
          if [ -f "$NARRATIVE" ]; then
            echo "Using narrative release notes from $NARRATIVE"
            cp "$NARRATIVE" /tmp/changelog.txt
          else
            echo "No narrative file at $NARRATIVE, falling back to manifest.json changelog"
            python -c "import json; print(json.load(open('manifest.json'))[0]['versions'][0]['changelog'])" > /tmp/changelog.txt
          fi
          echo "path=/tmp/changelog.txt" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ZIP="${{ steps.zip.outputs.path }}"
          NOTES="${{ steps.changelog.outputs.path }}"
          # Idempotent: if the release already exists (e.g. a prior run created it but the
          # downstream manifest patch failed and we're re-running the tag), update it and
          # re-upload the asset with --clobber instead of dead-ending on "already exists".
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes and re-uploading asset."
            gh release edit "$TAG" --title "$TAG" --notes-file "$NOTES"
            gh release upload "$TAG" "$ZIP" --clobber
          else
            gh release create "$TAG" "$ZIP" --title "$TAG" --notes-file "$NOTES"
          fi

      # ─── patch manifest.json on main, commit back ──────────────────────────
      - name: Switch to main and patch manifest.json
        env:
          TAG_VERSION: ${{ steps.version.outputs.dll_version }}
          CHECKSUM: ${{ steps.md5.outputs.checksum }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          tag_version = os.environ["TAG_VERSION"]
          checksum = os.environ["CHECKSUM"]
          timestamp = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S")

          p = Path("manifest.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          top = data[0]["versions"][0]

          if top["version"] != tag_version:
              raise SystemExit(
                  f"error: manifest.json versions[0].version is {top['version']!r} "
                  f"but the tag implies {tag_version!r}. Refusing to patch — "
                  f"main branch is out of sync with the released tag."
              )

          top["checksum"] = checksum
          top["timestamp"] = timestamp
          p.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          print(f"Patched manifest.json: version={tag_version}, checksum={checksum}, timestamp={timestamp}")
          PY

      - name: Commit manifest.json back to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit (checksum and timestamp already current)."
          else
            git commit -m "chore: auto-update manifest.json checksum + timestamp for ${{ steps.version.outputs.tag }}"
            git push origin main
          fi
