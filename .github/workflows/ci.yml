name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: build + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build (Release)
        run: dotnet build --configuration Release Jellyfin.Plugin.MaintenanceDeluxe/MaintenanceDeluxe.csproj

      - name: Run xUnit tests
        run: dotnet test --configuration Release Jellyfin.Plugin.MaintenanceDeluxe.Tests/Jellyfin.Plugin.MaintenanceDeluxe.Tests.csproj --logger "console;verbosity=normal"

      - name: Check banner.js is ASCII-safe
        run: python scripts/escape_non_ascii.py --check Jellyfin.Plugin.MaintenanceDeluxe/Resources/banner.js

      - name: Syntax check banner.js
        run: node --check Jellyfin.Plugin.MaintenanceDeluxe/Resources/banner.js

      - name: Syntax check configPage.html inline scripts
        run: |
          python scripts/check_inline_script.py \
            Jellyfin.Plugin.MaintenanceDeluxe/Configuration/configPage.html \
            -o /tmp/configPage_inline.js
          node --check /tmp/configPage_inline.js

      - name: Version coherence (csproj / manifest.json)
        run: python scripts/check_version_coherence.py
